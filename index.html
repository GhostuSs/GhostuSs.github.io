<!doctype html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

    <title>Maksim Movchan — Lead Flutter Developer</title>
    <meta name="description" content="Lead Flutter Developer with 4+ years at Gazprom Neft. 6+ live apps, 2 federal software copyrights, published pub.dev SDK, mobile dev educator." />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Maksim Movchan — Lead Flutter Developer" />
    <meta property="og:description" content="4+ years at Gazprom Neft · 6+ live apps · 2 RosPatent copyrights · pub.dev SDK author · Mobile dev educator" />
    <meta property="og:image" content="assets/photo.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="print.css" media="print" />
  </head>
  <body>
    <!-- Top navigation: language toggle + print button -->
    <nav class="topbar" aria-label="Top navigation">
      <div class="topbar-inner">
        <div class="lang-toggle" role="tablist" aria-label="Language switch">
          <button class="lang-btn" data-lang="ru" role="tab" aria-selected="true">
            <span class="flag" aria-hidden="true">
              <svg viewBox="0 0 24 16" width="24" height="16"><rect width="24" height="5.33" y="0" fill="#fff"/><rect width="24" height="5.33" y="5.33" fill="#0039A6"/><rect width="24" height="5.34" y="10.66" fill="#D52B1E"/></svg>
            </span>
            <span class="lang-label">RU</span>
          </button>
          <button class="lang-btn" data-lang="en" role="tab" aria-selected="false">
            <span class="flag" aria-hidden="true">
              <svg viewBox="0 0 24 16" width="24" height="16"><rect width="24" height="16" fill="#012169"/><path d="M0 0 L24 16 M24 0 L0 16" stroke="#fff" stroke-width="1.6"/><path d="M0 0 L24 16 M24 0 L0 16" stroke="#C8102E" stroke-width="0.8" stroke-dasharray="12 12" stroke-dashoffset="0"/><rect x="10" width="4" height="16" fill="#fff"/><rect y="6" width="24" height="4" fill="#fff"/><rect x="10.8" width="2.4" height="16" fill="#C8102E"/><rect y="6.8" width="24" height="2.4" fill="#C8102E"/></svg>
            </span>
            <span class="lang-label">EN</span>
          </button>
        </div>

        <div class="topbar-actions">
          <button class="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark">
            <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3A7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <a class="print-btn" id="download-btn" href="assets/cv-ru.pdf" download="Movchan_CV_RU.pdf">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span data-slot="print-label">Скачать PDF</span>
          </a>
        </div>
      </div>
    </nav>

    <!-- Main CV content (rendered by JS) -->
    <main class="cv" id="cv-root" aria-live="polite"></main>

    <footer class="cv-footer">
      <div class="cv-footer-inner">
        <span class="footer-meta">© <span data-slot="year">2026</span> Maksim Movchan</span>
        <span class="footer-meta">
          <a href="https://github.com/GhostuSs" target="_blank" rel="noopener">Source on GitHub</a>
        </span>
      </div>
    </footer>

    <!-- Data -->
    <script src="data/cv-ru.js"></script>
    <script src="data/cv-en.js"></script>

    <!-- App -->
    <script src="script.js"></script>
  </body>
</html>
